[mod-setting-name]
mining-speed-bonus-per-quality-level=Mining Speed Bonus per Quality level
drop-stacks-on-belt=Drop output as stacks

[mod-setting-description]
mining-speed-bonus-per-quality-level=Sets the speed bonus per quality level. E.g. 0.3 => +30% for uncommon(lvl 1) and +150% for legendary(lvl 5) Bonus for vanilla assemblers is 0.3 or +30%.
drop-stacks-on-belt=All miners wait with outputting until they have a stack (limited by technology level) like Big Miners. Regardless of setting, if there are multiple items being output on the same tick (from productivity and normal mining cycle lining up) a stack will be output if technology allows.